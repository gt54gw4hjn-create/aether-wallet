<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        var CURRENT_VERSION = '11.8';
        var savedVersion = localStorage.getItem('timmy_wallet_app_version');
        if (savedVersion !== CURRENT_VERSION) {
          var promises = [];
          if ('serviceWorker' in navigator) {
            promises.push(
              navigator.serviceWorker.getRegistrations().then(function(registrations) {
                var unregisterPromises = [];
                for (var i = 0; i < registrations.length; i++) {
                  unregisterPromises.push(registrations[i].unregister());
                }
                return Promise.all(unregisterPromises);
              })
            );
          }
          if ('caches' in window) {
            promises.push(
              caches.keys().then(function(keys) {
                var deletePromises = [];
                for (var i = 0; i < keys.length; i++) {
                  deletePromises.push(caches.delete(keys[i]));
                }
                return Promise.all(deletePromises);
              })
            );
          }
          
          var doReload = function() {
            localStorage.setItem('timmy_wallet_app_version', CURRENT_VERSION);
            window.location.reload(true);
          };

          if (promises.length > 0) {
            Promise.all(promises).then(doReload).catch(doReload);
          } else {
            doReload();
          }
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Timmy Wallet</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#090d16" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Timmy" />
    <link rel="apple-touch-icon" href="/icon.png" />
  </head>
  <body class="m-0 p-0 overflow-x-hidden antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
